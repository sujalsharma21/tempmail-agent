# render.yaml — Render free tier deployment config
# Place this at the ROOT of your repository

services:
  - type: web
    name: tempmail-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: tempmail-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tempmail-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tempmail-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: tempmail-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tempmail-db
          property: password
      - key: CORS_ORIGINS
        value: https://YOUR-APP.netlify.app   # ← update after Netlify deploy

databases:
  - name: tempmail-db
    databaseName: tempmail_db
    plan: free
